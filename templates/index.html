<!DOCTYPE html>
<html>
<head>
  <title>Document Clustering App</title>
  <style>
    body { font-family: Arial; margin: 50px; text-align: center; }
    textarea { width: 70%; height: 200px; margin-top: 20px; }
    button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
    .result { margin-top: 30px; text-align: left; display: inline-block; width: 70%; }
    .cluster { background: #f0f0f0; padding: 10px; margin: 5px; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>📄 Document Clustering</h2>

  <form action="/cluster" method="post">
    <textarea name="documents" placeholder="Enter each document on a new line or separate by blank lines..."></textarea><br>
    <button type="submit">Cluster Documents</button>
  </form>

  {% if clustered_docs %}
  <div class="result">
    <h3>🔍 Cluster Results:</h3>
    {% for label, doc in clustered_docs %}
      <div class="cluster">
        <strong>{{ label }}</strong>: {{ doc }}
      </div>
    {% endfor %}
  </div>
  {% elif result %}
  <div class="result">{{ result }}</div>
  {% endif %}
</body>
</html>
